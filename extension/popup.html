<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=350">
  <title>Groundwork Capture</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="header-brand">
      <svg class="header-logo" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/>
        <path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10"/>
        <path d="M2 12h20"/>
        <path d="M12 2c2.5 2.5 4 6 4 10s-1.5 7.5-4 10"/>
      </svg>
      <span class="header-title">Groundwork</span>
    </div>
    <button id="btn-settings" class="btn-icon" title="Settings">
      <svg viewBox="0 0 20 20" width="16" height="16" fill="currentColor">
        <path d="M10 3a1.5 1.5 0 110 3 1.5 1.5 0 010-3zm0 5.5a1.5 1.5 0 110 3 1.5 1.5 0 010-3zm0 5.5a1.5 1.5 0 110 3 1.5 1.5 0 010-3z"/>
      </svg>
    </button>
  </header>

  <!-- Connection status -->
  <div id="status-bar" class="status-bar status-disconnected">
    <span class="status-dot"></span>
    <span id="status-text">Not connected</span>
  </div>

  <!-- Settings panel (hidden by default) -->
  <section id="settings-panel" class="panel settings-panel hidden">
    <h3>Settings</h3>
    <label>
      <span>Groundwork Project ID</span>
      <input type="text" id="input-project-id" placeholder="Paste from groundwork.kad.london/projects">
    </label>
    <p style="font-size:10px;color:#888;margin:4px 0 8px;">Find it below each project card on the Projects page</p>
    <input type="hidden" id="input-supabase-url" value="">
    <input type="hidden" id="input-supabase-key" value="">
    <div class="settings-actions">
      <button id="btn-save-settings" class="btn btn-primary">Save</button>
      <button id="btn-cancel-settings" class="btn btn-secondary">Cancel</button>
    </div>
  </section>

  <!-- Main capture panel -->
  <section id="capture-panel" class="panel">
    <!-- Platform info -->
    <div id="platform-info" class="platform-info hidden">
      <span id="platform-badge" class="badge"></span>
      <span id="platform-detail" class="platform-detail"></span>
    </div>

    <div class="capture-buttons">
      <button id="btn-capture-visible" class="btn btn-capture">
        <span class="btn-icon-left">&#128247;</span>
        Capture Visible Area
      </button>
      <button id="btn-capture-full" class="btn btn-capture">
        <span class="btn-icon-left">&#128247;</span>
        Capture Page
      </button>
      <button id="btn-capture-selection" class="btn btn-capture">
        <span class="btn-icon-left">&#9986;</span>
        Capture Selection
      </button>
    </div>
  </section>

  <!-- Preview panel (hidden until capture) -->
  <section id="preview-panel" class="panel hidden">
    <div class="preview-container">
      <img id="preview-image" alt="Captured screenshot">
      <button id="btn-discard" class="btn-discard" title="Discard">&times;</button>
    </div>
    <label>
      <span>Competitor / Brand</span>
      <input type="text" id="input-competitor" placeholder="e.g. Acme Corp">
    </label>
    <div class="preview-actions">
      <button id="btn-analyze-save" class="btn btn-primary">
        Analyze &amp; Save
      </button>
      <button id="btn-save-only" class="btn btn-secondary">
        Save without analysis
      </button>
    </div>
  </section>

  <!-- Status / progress -->
  <div id="progress-bar" class="progress-bar hidden">
    <div id="progress-fill" class="progress-fill"></div>
  </div>
  <div id="message" class="message hidden"></div>

  <script src="api.js"></script>
  <script src="popup.js"></script>
</body>
</html>
